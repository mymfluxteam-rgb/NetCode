
  <!DOCTYPE html>
  <html lang="en">
    <head>
      
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <link rel="icon" type="image/png" href="./logo.png" />
      <title>NetCodeShop — Premium Source Code Marketplace</title>
      <meta name="description" content="NetCodeShop offers a user-friendly platform for purchasing high-quality source code, catering to developers and businesses seeking efficient coding solutions." />
      <meta name="robots" content="noindex, nofollow" />

      <!-- Open Graph / Facebook -->
      <meta property="og:type" content="website" />
      <meta property="og:url" content="https://netcodeshop.github.io/" />
      <meta property="og:title" content="NetCodeShop — Premium Source Code Marketplace" />
      <meta property="og:description" content="Discover and purchase high-quality, ready-to-use source code for Android tools, flashing utilities, license systems and more. Instant delivery." />
      <meta property="og:image" content="https://netcodeshop.github.io/logo.png" />
      <meta property="og:image:width" content="1200" />
      <meta property="og:image:height" content="630" />
      <meta property="og:site_name" content="NetCodeShop" />

      <!-- Twitter / X Card -->
      <meta name="twitter:card" content="summary_large_image" />
      <meta name="twitter:url" content="https://netcodeshop.github.io/" />
      <meta name="twitter:title" content="NetCodeShop — Premium Source Code Marketplace" />
      <meta name="twitter:description" content="Discover and purchase high-quality, ready-to-use source code for Android tools, flashing utilities, license systems and more. Instant delivery." />
      <meta name="twitter:image" content="https://netcodeshop.github.io/logo.png" />

      <!-- Telegram uses Open Graph tags automatically -->

      <style>html, body { height: 100%; margin: 0; } #root { height: 100%; }</style>
      <!-- spa-github-pages: restore path encoded by 404.html -->
      <script>
        (function (l) {
          if (l.search[1] === '/') {
            var decoded = l.search.slice(1).split('&').map(function (s) {
              return s.replace(/~and~/g, '&');
            });
            window.history.replaceState(
              null, null,
              decoded[0] + (decoded[1] ? '&' + decoded[1] : '') + l.hash
            );
          }
        }(window.location));
      </script>
      
    </head>

    <body>
      
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
      
    </body>
  </html>
