<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>NetCodeShop</title>
    <script>
      // spa-github-pages redirect trick
      // Encodes the current path into a query-string redirect so GitHub Pages
      // serves index.html, which then restores the real URL via history.replaceState.
      //
      // pathSegmentsToKeep = 1  →  project site  (username.github.io/repo-name)
      // pathSegmentsToKeep = 0  →  user/org site (username.github.io)
      var pathSegmentsToKeep = 1;

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.host +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') +
        '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
